<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#E6EDF3" opacity="0.035"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="199" rx="16" fill="#0D1117" stroke="#30363D"/>
  <rect x="1" y="1" width="878" height="198" rx="15" fill="url(#dots)"/>

  <!-- Left accent bar -->


  <!-- Title -->
  <text x="28" y="46" font-size="14.63" fill="#E6EDF3" font-weight="bold">MyMedicalHub</text>

  <!-- Proprietary badge -->
  <rect x="196" y="30" width="88" height="22" rx="11" fill="none" stroke="#30363D"/>
  <text x="240" y="45" font-size="9.5" fill="#8B949E" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" letter-spacing="1">PROPRIETARY</text>

  <text x="300" y="46" font-size="13" fill="#8B949E" font-weight="normal">— Health-Tech SaaS</text>

  <!-- Description -->
  <text x="28" y="76" font-size="13" fill="#8B949E">
    <tspan x="28" dy="0">FSM-based biometric engine on MediaPipe for deterministic 60 FPS pose estimation; WebRTC</tspan>
    <tspan x="28" dy="18">telemedicine pipeline with Socket.IO feedback; Konva.js canvas engine for range-of-motion</tspan>
    <tspan x="28" dy="18">correction; HIPAA-compliant SSO with branded HTML/PDF clinical reporting.</tspan>
  </text>

  <!-- Separator -->
  <rect x="28" y="130" width="824" height="1" fill="#30363D"/>

  <!-- Tech tags -->
  <rect x="28" y="148" width="56" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="56" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">React</text>

  <rect x="94" y="148" width="56" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="122" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Redux</text>

  <rect x="160" y="148" width="78" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="199" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">MediaPipe</text>

  <rect x="248" y="148" width="66" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="281" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">WebRTC</text>

  <rect x="324" y="148" width="68" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="358" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Konva.js</text>

  <rect x="402" y="148" width="56" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="430" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Azure</text>

  <rect x="468" y="148" width="46" height="24" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="491" y="164" font-size="10.5" fill="#E6EDF3" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">SSO</text>
</svg>