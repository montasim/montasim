<svg xmlns="http://www.w3.org/2000/svg" width="880" height="210" viewBox="0 0 880 210" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#1F2328" opacity="0.04"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="209" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <rect x="1" y="1" width="878" height="208" rx="15" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="0.5" y="0.5" width="4" height="209" rx="2" fill="#9A6F12" opacity="0.6"/>

  <!-- Title -->
  <text x="44" y="46" font-size="22" fill="#1F2328" font-weight="bold">MyMedicalHub</text>

  <!-- Proprietary badge -->
  <rect x="212" y="30" width="88" height="22" rx="11" fill="none" stroke="#D0D7DE"/>
  <text x="256" y="45" font-size="9.5" fill="#656D76" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" letter-spacing="1">PROPRIETARY</text>

  <text x="316" y="46" font-size="13" fill="#656D76" font-weight="normal">— Health-Tech SaaS</text>

  <!-- Description -->
  <text x="44" y="76" font-size="13" fill="#656D76">
    <tspan x="44" dy="0">FSM-based biometric engine on MediaPipe for deterministic 60 FPS pose estimation; WebRTC</tspan>
    <tspan x="44" dy="18">telemedicine pipeline with Socket.IO feedback; Konva.js canvas engine for range-of-motion</tspan>
    <tspan x="44" dy="18">correction; HIPAA-compliant SSO with branded HTML/PDF clinical reporting.</tspan>
  </text>

  <!-- Separator -->
  <rect x="44" y="130" width="792" height="1" fill="#D0D7DE"/>

  <!-- Tech tags -->
  <rect x="44" y="148" width="56" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="72" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">React</text>

  <rect x="110" y="148" width="56" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="138" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Redux</text>

  <rect x="176" y="148" width="78" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="215" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">MediaPipe</text>

  <rect x="264" y="148" width="66" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="297" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">WebRTC</text>

  <rect x="340" y="148" width="68" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="374" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Konva.js</text>

  <rect x="418" y="148" width="56" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="446" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Azure</text>

  <rect x="484" y="148" width="46" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="507" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">SSO</text>
</svg>