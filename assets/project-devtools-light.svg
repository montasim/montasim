  <rect x="44" y="148" width="72" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="80" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Next.js 16</text>

  <rect x="126" y="148" width="68" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="160" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">React 19</text>

  <rect x="204" y="148" width="82" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="245" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">TypeScript</text>

  <rect x="296" y="148" width="78" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="335" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">PostgreSQL</text>

  <rect x="384" y="148" width="64" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="416" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Prisma 7</text>

  <rect x="458" y="148" width="96" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="506" y="164" font-size="10.5" fill="#1F2328" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">TanStack Query</text>

  <rect x="564" y="148" width="96" height="24" rx="6" fill="#F6F8FA" stroke="#D0D7DE"/>
