<svg xmlns="http://www.w3.org/2000/svg" width="880" height="210" viewBox="0 0 880 210" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#1F2328" opacity="0.04"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="209" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <rect x="1" y="1" width="878" height="208" rx="15" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="0.5" y="0.5" width="4" height="209" rx="2" fill="#9A6F12" opacity="0.6"/>

  <!-- Title -->
  <text x="44" y="46" font-size="22" fill="#1F2328" font-weight="bold">DevTools</text>
  <text x="162" y="46" font-size="13" fill="#656D76" font-weight="normal">— Developer Tools Suite</text>

  <!-- Links -->
  <a href="https://devtoolsn.vercel.app"><text x="726" y="46" font-size="11.5" fill="#9A6F12" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" font-weight="bold">Live Demo →</text></a>
  <a href="https://github.com/montasim"><text x="826" y="46" font-size="11.5" fill="#656D76" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">Source</text></a>

  <!-- Description -->
  <text x="44" y="76" font-size="13" fill="#656D76">
    <tspan x="44" dy="0">A privacy-first suite of 40+ browser-based developer tools — JSON/text diffing, Base64, regex,</tspan>
    <tspan x="44" dy="18">hashing, RSA keys, QR, cron — most running fully client-side. Next.js 16 App Router backend</tspan>
    <tspan x="44" dy="18">across 20 API routes: JWT/OTP auth, URL shortener, and password-protected share links.</tspan>
  </text>

  <!-- Separator -->
  <rect x="44" y="130" width="792" height="1" fill="#D0D7DE"/>

