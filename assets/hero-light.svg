<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="880" height="228" viewBox="0 0 880 228" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#1F2328" opacity="0.04"/>
    </pattern>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9A6F12" stop-opacity="0.7"/>
      <stop offset="0.6" stop-color="#9A6F12" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#9A6F12" stop-opacity="0"/>
    </linearGradient>
    
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="879" height="227" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <rect x="1" y="1" width="878" height="226" rx="15" fill="url(#dots)"/>

  <!-- Profile photo -->
  
  

  <!-- Title label -->
  <rect x="44" y="38" width="22" height="3" rx="1.5" fill="#9A6F12"/>
  <text x="44" y="58" font-size="11" fill="#9A6F12" font-weight="bold" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" letter-spacing="2.8">SENIOR SOFTWARE ENGINEER</text>

  <!-- Name -->
  <text x="44" y="92" font-size="26" fill="#1F2328" font-weight="bold" letter-spacing="0.2">
    <tspan x="44" dy="0">Mohammad Montasim Al Mamun Shuvo</tspan>
  </text>

  <!-- Tagline -->
  <text x="44" y="128" font-size="14" fill="#656D76">Real-time, AI-driven web platforms that stay reliable under pressure.</text>

  <!-- Location -->
  <path d="M48 140 C48 137.5 49.5 136 51 136 C52.5 136 54 137.5 54 140 C54 142.5 51 147 51 147 C51 147 48 142.5 48 140 Z" fill="none" stroke="#656D76" stroke-width="1.2" opacity="0.8"/>
  <circle cx="51" cy="140" r="1.2" fill="#656D76" opacity="0.8"/>
  <text x="60" y="144" font-size="11.5" fill="#656D76" opacity="0.7">Dhaka, Bangladesh</text>

  <!-- Open to Work badge -->
  <rect x="700" y="28" width="140" height="26" rx="13" fill="none" stroke="#9A6F12" stroke-opacity="0.5"/>
  <circle cx="718" cy="41" r="3.5" fill="#9A6F12"/>
  <text x="728" y="45" font-size="10" fill="#9A6F12" font-weight="bold" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" letter-spacing="1.2">OPEN TO WORK</text>

  <!-- Bottom accent line -->
  <rect x="40" y="196" width="800" height="1.5" fill="url(#rule)"/>

  <!-- Quick stats -->
  <text x="40" y="214" font-size="10.5" fill="#656D76" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">
    <tspan font-weight="bold" fill="#9A6F12">3+</tspan> yrs full-stack
    <tspan dx="20" font-weight="bold" fill="#9A6F12">2×</tspan> promotions
    <tspan dx="20" font-weight="bold" fill="#9A6F12">HIPAA</tspan> compliant
  </text>
</svg>