<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="880" height="244" viewBox="0 0 880 244" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#1F2328" opacity="0.04"/>
    </pattern>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B8B5" stop-opacity="0.7"/>
      <stop offset="0.6" stop-color="#00B8B5" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#00B8B5" stop-opacity="0"/>
    </linearGradient>
    
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="879" height="243" rx="16" fill="#FFFFFF" stroke="#D0D7DE"/>
  <rect x="1" y="1" width="878" height="242" rx="15" fill="url(#dots)"/>

  <!-- Profile photo -->
  
  

  <!-- Title label -->
  <rect x="28" y="38" width="22" height="3" rx="1.5" fill="#00B8B5"/>
  <text x="28" y="58" font-size="11" fill="#00B8B5" font-weight="bold" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" letter-spacing="2.8">SENIOR SOFTWARE ENGINEER</text>

  <!-- Name -->
  <text x="28" y="92" font-size="26" fill="#1F2328" font-weight="bold" letter-spacing="0.2">
    <tspan x="28" dy="0">Mohammad Montasim Al Mamun Shuvo</tspan>
  </text>

  <!-- Tagline -->
  <text x="28" y="128" font-size="14" fill="#656D76">React, Next.js, Node.js, TypeScript | Cloud, Microservice | Scalable Real-Time &amp; AI-Driven SaaS | HIPAA-Grade Systems</text>

  <!-- Location -->
  <path d="M28 145 C28 142.5 29.5 141 31 141 C32.5 141 34 142.5 34 145 C34 147.5 31 152 31 152 C31 152 28 147.5 28 145 Z" fill="none" stroke="#656D76" stroke-width="1.2"/>
  <circle cx="31" cy="145" r="1.2" fill="#656D76"/>
  <text x="40" y="149" font-size="11.5" fill="#656D76">Dhaka, Bangladesh</text>

  <!-- Open to Work badge -->
  <rect x="712" y="28" width="140" height="26" rx="13" fill="none" stroke="#00B8B5" stroke-opacity="0.5"/>
  <circle cx="730" cy="41" r="3.5" fill="#00B8B5"/>
  <text x="740" y="45" font-size="10" fill="#00B8B5" font-weight="bold" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace" letter-spacing="1.2">OPEN TO WORK</text>

  <!-- Bottom accent line -->
  <rect x="28" y="196" width="824" height="1.5" fill="url(#rule)"/>

  <!-- Quick stats -->
  <text x="28" y="214" font-size="10.5" fill="#656D76" font-family="'SF Mono','JetBrains Mono','Roboto Mono','DejaVu Sans Mono',monospace">
    <tspan font-weight="bold" fill="#00B8B5">3+</tspan> yrs full-stack
    <tspan dx="20" font-weight="bold" fill="#00B8B5">2×</tspan> promotions
    <tspan dx="20" font-weight="bold" fill="#00B8B5">HIPAA</tspan> compliant
