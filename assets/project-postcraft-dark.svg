  <!-- Left accent bar -->


  <!-- Title -->
  <text x="28" y="46" font-size="14.63" fill="#E6EDF3" font-weight="bold">PostCraft</text>
  <text x="172" y="46" font-size="13" fill="#8B949E" font-weight="normal">— AI-Powered Social Media Manager</text>

  <!-- Links -->
  
  

  <!-- Description -->
  <text x="28" y="76" font-size="13" fill="#8B949E">
    <tspan x="28" dy="0">Turns a single topic prompt into multiple scored, ranked post variants via Google Gemini,</tspan>
    <tspan x="28" dy="18">governed by brand guardrails. Ships OAuth publishing &amp; scheduling to LinkedIn, Twitter, and</tspan>
    <tspan x="28" dy="18">Facebook with Inngest background queues for a non-blocking UI.</tspan>
  </text>

  <!-- Separator -->
  <rect x="28" y="130" width="824" height="1" fill="#30363D"/>

