  <!-- Left accent bar -->


  <!-- Title -->
  <text x="28" y="46" font-size="14.63" fill="#E6EDF3" font-weight="bold">DevTools</text>
  <text x="146" y="46" font-size="13" fill="#8B949E" font-weight="normal">— Developer Tools Suite</text>

  <!-- Links -->
  
  

  <!-- Description -->
  <text x="28" y="76" font-size="13" fill="#8B949E">
    <tspan x="28" dy="0">A privacy-first suite of 40+ browser-based developer tools — JSON/text diffing, Base64, regex,</tspan>
    <tspan x="28" dy="18">hashing, RSA keys, QR, cron — most running fully client-side. Next.js 16 App Router backend</tspan>
    <tspan x="28" dy="18">across 20 API routes: JWT/OTP auth, URL shortener, and password-protected share links.</tspan>
  </text>

