<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#E6EDF3" opacity="0.035"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="199" rx="16" fill="#0D1117" stroke="#30363D"/>
