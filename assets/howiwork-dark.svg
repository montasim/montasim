<svg xmlns="http://www.w3.org/2000/svg" width="880" height="224" viewBox="0 0 880 224" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,'DejaVu Sans',sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#E6EDF3" opacity="0.035"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="223" rx="16" fill="#0D1117" stroke="#30363D"/>
  <rect x="1" y="1" width="878" height="222" rx="15" fill="url(#dots)"/>

  <!-- Row 1: Clean Architecture -->
  <rect x="28" y="28" width="824" height="36" rx="8" fill="#161B22" stroke="#30363D"/>
  <rect x="28" y="28" width="3" height="36" rx="1.5" fill="#00B8B5" opacity="0.55"/>
  <text x="46" y="51" font-size="13" fill="#E6EDF3" font-weight="bold">Clean architecture by default</text>
  <text x="274" y="51" font-size="13" fill="#8B949E">— SOLID, modular boundaries, no monolithic functions.</text>

  <!-- Row 2: Next.js App Router -->
  <rect x="28" y="72" width="824" height="36" rx="8" fill="#161B22" stroke="#30363D"/>
  <rect x="28" y="72" width="3" height="36" rx="1.5" fill="#00B8B5" opacity="0.55"/>
  <text x="46" y="95" font-size="13" fill="#E6EDF3" font-weight="bold">Next.js App Router, done right</text>
  <text x="302" y="95" font-size="13" fill="#8B949E">— Server Components first, Client Components only for interactivity.</text>

  <!-- Row 3: Deterministic State -->
  <rect x="28" y="116" width="824" height="36" rx="8" fill="#161B22" stroke="#30363D"/>
  <rect x="28" y="116" width="3" height="36" rx="1.5" fill="#00B8B5" opacity="0.55"/>
  <text x="46" y="139" font-size="13" fill="#E6EDF3" font-weight="bold">Deterministic state</text>
  <text x="216" y="139" font-size="13" fill="#8B949E">— finite-state machines over ad-hoc hooks for anything safety-critical.</text>

  <!-- Row 4: Tested & Measured -->
  <rect x="28" y="160" width="824" height="36" rx="8" fill="#161B22" stroke="#30363D"/>
  <rect x="28" y="160" width="3" height="36" rx="1.5" fill="#00B8B5" opacity="0.55"/>
  <text x="46" y="183" font-size="13" fill="#E6EDF3" font-weight="bold">Tested &amp; measured</text>
  <text x="218" y="183" font-size="13" fill="#8B949E">— Jest / React Testing Library, Lighthouse budgets, CI/CD on every merge.</text>
</svg>